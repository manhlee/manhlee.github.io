<!DOCTYPE html>
  <html lang="en">
    <head>
      <title>Chúc mừng năm mới 2022</title>
      <!-- Required meta tags -->
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

      <!-- Bootstrap CSS -->
      <link rel="stylesheet" href="css/style.css">
      <link rel="stylesheet" href="css/phaohoa.css">
      <link rel="stylesheet" href="css/spinload.css">
      <link rel="stylesheet" type="text/css" href=" https://fonts.googleapis.com/css?family=Pacifico" />
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    </head>
    <body>
      <div class="pyro"><div class="before"></div><div class="after"></div></div>
      <div class="wrapper">
        <!-- Preloader -->
      <div id="preloader">
        <div class="spinner">
          <div class="rect1"></div>
          <div class="rect2"></div>
          <div class="rect3"></div>
          <div class="rect4"></div>
          <div class="rect5"></div>
        </div>
    </div>
        <div class="content">
          <header>
            <h2 class="my-txt" id="demo1">Chúc mừng năm mới 2022!!</h2>
            <h4>
            <p class="my-txt">Đầu xuân năm mới chúc BÌNH AN</p>
            <p class="my-txt">Chúc luôn TUỔI TRẺ chúc AN KHANG</p>
            <p class="my-txt">Chúc sang năm mới nhiều TÀI LỘC</p>
            <p class="my-txt">Công thành danh toại chúc VINH QUANG</p>

            </h4>
          </header>
          <button id="yes" type="button" class="btn btn-danger btn-lg">Nhận lời chúc từ Mạnh<333 </button>
          <button id="no" type="button" class="btn btn-info btn-lg">Nhận lì xì từ Mạnh</button>
        </div>
      </div>
      <div class="footer">
  		<p>Manh Le - Overwrite</p>
	  </div>
    <iframe src="./music/Happy New Year - ABBA-nhacchuong123.com.mp3" allow="autoplay" style="display:none" id="iframeAudio">
    </iframe>
    <audio autoplay loop  id="playAudio">
      <source src="./music/Happy New Year - ABBA-nhacchuong123.com.mp3">
  </audio>
      <!-- <audio src="./music/Happy New Year - ABBA-nhacchuong123.com.mp3" autoplay loop></audio> -->
      
      <script src="js/jquery-3.4.1.js"></script>
      <script src="js/popper.min.js"></script>
      <script src="js/bootstrap.min.js"></script>
      <script src="js/sweetalert2@9.js"></script>
      <script src="js/script.js"></script>
      <script>
          var isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
          if (!isChrome){
              $('#iframeAudio').remove()
          }
          else {
              $('#playAudio').remove() // just to make sure that it will not have 2x audio in the background 
          }
      </script>

    </body>
  </html>
